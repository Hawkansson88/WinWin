<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Min avdelning – WinWin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --green:#1D9E75;--green-light:#E1F5EE;--green-dark:#0F6E56;
      --danger:#E24B4A;--danger-light:#FCEBEB;
      --amber:#EF9F27;--amber-light:#FAEEDA;
      --bg:#F7F6F2;--surface:#FFFFFF;
      --border:rgba(0,0,0,0.08);--border-med:rgba(0,0,0,0.14);
      --text:#1A1A18;--muted:#6B6B67;--faint:#9C9C98;
    }
    *{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}

    header{background:var(--surface);border-bottom:1px solid var(--border);padding:0 2rem;display:flex;align-items:center;justify-content:space-between;height:60px;position:sticky;top:0;z-index:100;}
    .logo{font-size:17px;font-weight:600;letter-spacing:-0.02em;}
    .logo span{color:var(--green);}
    .back-link{font-size:13px;color:var(--muted);text-decoration:none;padding:6px 12px;border:1px solid var(--border);border-radius:8px;transition:all 0.15s;}
    .back-link:hover{color:var(--text);}

    .content{max-width:700px;margin:0 auto;padding:2rem 1.5rem;}
    .page-title{font-size:22px;font-weight:600;letter-spacing:-0.02em;margin-bottom:4px;}
    .page-sub{font-size:14px;color:var(--muted);margin-bottom:2rem;}

    .card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:1.5rem;margin-bottom:1rem;}

    .field{margin-bottom:1rem;}
    .field label{display:block;font-size:13px;font-weight:500;margin-bottom:5px;color:var(--muted);}
    .field input,.field select,.field textarea{
      width:100%;padding:10px 14px;border:1px solid var(--border-med);border-radius:10px;
      font-size:15px;font-family:'DM Sans',sans-serif;background:var(--surface);color:var(--text);
      transition:border-color 0.15s;outline:none;
    }
    .field textarea{resize:vertical;min-height:72px;line-height:1.5;}
    .field input:focus,.field select:focus,.field textarea:focus{border-color:var(--green);}

    .btn{padding:10px 20px;border:none;border-radius:10px;font-size:14px;font-weight:500;font-family:'DM Sans',sans-serif;cursor:pointer;transition:all 0.15s;}
    .btn-primary{background:var(--green);color:#fff;}
    .btn-primary:hover{background:var(--green-dark);}
    .btn-sm{padding:7px 16px;font-size:13px;}
    .btn-outline{background:var(--bg);border:1px solid var(--border-med);color:var(--text);}
    .btn-outline:hover{border-color:rgba(0,0,0,0.25);}

    .alert{padding:10px 14px;border-radius:10px;font-size:13px;margin-bottom:1rem;}
    .alert-error{background:var(--danger-light);color:var(--danger);}
    .alert-success{background:var(--green-light);color:var(--green-dark);}
    .alert-warn{background:var(--amber-light);color:#633806;}

    .dept-info-bar{display:flex;align-items:center;justify-content:space-between;background:var(--green-light);border:1px solid rgba(29,158,117,0.2);border-radius:12px;padding:12px 16px;margin-bottom:1.5rem;}
    .dept-info-name{font-size:15px;font-weight:600;color:var(--green-dark);}
    .logout-btn{font-size:12px;color:var(--faint);cursor:pointer;background:none;border:none;font-family:'DM Sans',sans-serif;padding:4px 8px;border-radius:6px;}
    .logout-btn:hover{color:var(--danger);background:var(--danger-light);}

    .week-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;margin-bottom:1rem;overflow:hidden;}
    .week-card-header{padding:1rem 1.25rem;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;cursor:pointer;user-select:none;}
    .week-card-header:hover{background:#FAFAF8;}
    .week-number{font-size:15px;font-weight:600;}
    .week-status-badges{display:flex;gap:6px;align-items:center;flex-wrap:wrap;}
    .badge{font-size:11px;font-weight:500;padding:3px 9px;border-radius:20px;}
    .badge-done{background:var(--green-light);color:var(--green-dark);}
    .badge-partial{background:var(--amber-light);color:#633806;}
    .badge-empty{background:#F1EFE8;color:var(--faint);}
    .chevron{font-size:12px;color:var(--faint);transition:transform 0.2s;margin-left:10px;flex-shrink:0;}
    .chevron.open{transform:rotate(180deg);}
    .week-card-body{padding:1.25rem;display:none;}
    .week-card-body.open{display:block;}

    .goals-list{margin-bottom:1rem;}
    .goal-item{background:var(--bg);border:1px solid var(--border);border-radius:12px;padding:1rem 1.1rem;margin-bottom:8px;animation:fadeUp 0.2s ease both;}
    @keyframes fadeUp{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}
    .goal-item-header{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;}
    .goal-item-index{font-size:11px;font-weight:600;color:var(--faint);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:3px;}
    .goal-item-text{font-size:14px;font-weight:500;color:var(--text);line-height:1.4;}
    .goal-item-desc{font-size:12px;color:var(--muted);margin-top:2px;line-height:1.4;}
    .goal-item-actions{display:flex;gap:4px;flex-shrink:0;}
    .icon-btn{background:none;border:none;cursor:pointer;font-size:13px;color:var(--faint);padding:4px 6px;border-radius:6px;transition:all 0.15s;}
    .icon-btn:hover{background:rgba(0,0,0,0.06);color:var(--text);}
    .icon-btn.delete:hover{background:var(--danger-light);color:var(--danger);}

    .goal-edit-form{background:var(--surface);border:1px solid var(--green);border-radius:12px;padding:1rem;margin-bottom:8px;}

    .goal-result{margin-top:10px;padding-top:10px;border-top:1px solid var(--border);}
    .result-label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.06em;color:var(--faint);margin-bottom:8px;}
    .yn-buttons{display:flex;gap:8px;margin-bottom:10px;}
    .yn-btn{flex:1;padding:10px;border:2px solid var(--border-med);border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;background:var(--bg);color:var(--muted);transition:all 0.15s;font-family:'DM Sans',sans-serif;text-align:center;}
    .yn-btn:hover{border-color:rgba(0,0,0,0.25);}
    .yn-btn.selected-yes{background:var(--green-light);border-color:var(--green);color:var(--green-dark);}
    .yn-btn.selected-no{background:var(--danger-light);border-color:var(--danger);color:var(--danger);}
    .result-saved{display:flex;align-items:center;gap:8px;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:8px 10px;margin-bottom:4px;}
    .result-saved-yn{font-size:13px;font-weight:600;white-space:nowrap;}
    .result-saved-yn.yes{color:var(--green-dark);}
    .result-saved-yn.no{color:var(--danger);}
    .result-saved-comment{font-size:12px;color:var(--muted);flex:1;line-height:1.4;}
    .result-edit-link{font-size:12px;color:var(--muted);background:none;border:none;cursor:pointer;font-family:'DM Sans',sans-serif;text-decoration:underline;white-space:nowrap;padding:0;}

    .save-row{display:flex;align-items:center;gap:10px;margin-top:8px;}
    .save-status{font-size:12px;}

    .add-goal-form{background:var(--bg);border:1px dashed var(--border-med);border-radius:12px;padding:1rem;}
    .subsection-label{font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:0.06em;color:var(--muted);margin-bottom:10px;}
    .add-goal-btn{display:flex;align-items:center;justify-content:center;gap:6px;font-size:13px;font-weight:500;color:var(--green);background:none;border:1px dashed rgba(29,158,117,0.4);border-radius:10px;padding:9px 14px;cursor:pointer;width:100%;transition:all 0.15s;font-family:'DM Sans',sans-serif;}
    .add-goal-btn:hover{background:var(--green-light);border-color:var(--green);}

    .spinner{width:24px;height:24px;border:2px solid var(--border);border-top-color:var(--green);border-radius:50%;animation:spin 0.7s linear infinite;margin:2rem auto;}
    @keyframes spin{to{transform:rotate(360deg);}}

    @media(max-width:500px){.content{padding:1.25rem 1rem;}.yn-btn{font-size:13px;padding:8px 4px;}}
  </style>
</head>
<body>

<header>
  <div class="logo">WinWin <span>NKS</span></div>
  <a href="index.html" class="back-link">← Dashboard</a>
</header>

<div class="content">
  <div class="page-title">Min avdelning</div>
  <div class="page-sub">Lägg in era veckomål och rapportera framdriften varje fredag.</div>

  <div id="login-section">
    <div class="card" style="max-width:420px;">
      <div style="font-size:16px;font-weight:600;margin-bottom:4px;">Logga in</div>
      <div style="font-size:13px;color:var(--muted);margin-bottom:1.25rem;">Välj din avdelning och ange ditt lösenord.</div>
      <div id="login-error" class="alert alert-error" style="display:none;"></div>
      <div class="field">
        <label>Avdelning</label>
        <select id="dept-select"><option value="">Laddar…</option></select>
      </div>
      <div class="field" style="margin-bottom:1.25rem;">
        <label>Lösenord</label>
        <input type="password" id="password-input" placeholder="••••••••" autocomplete="current-password" />
      </div>
      <button class="btn btn-primary" style="width:100%;padding:12px;" onclick="doLogin()">Logga in</button>
    </div>
  </div>

  <div id="main-section" style="display:none;">
    <div id="global-alert" class="alert" style="display:none;"></div>
    <div class="dept-info-bar">
      <div class="dept-info-name" id="logged-in-name">–</div>
      <button class="logout-btn" onclick="doLogout()">Logga ut</button>
    </div>
    <div id="panel-loading"><div class="spinner"></div></div>
    <div id="weeks-container" style="display:none;"></div>
  </div>
</div>

<script>
  const SUPABASE_URL      = 'https://rszsekmefhimebpkxcyb.supabase.co';
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJzenNla21lZmhpbWVicGt4Y3liIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ0MDQwMDMsImV4cCI6MjA4OTk4MDAwM30.eLMABGNPFfhQN8kqCYTX_q1c4LIZBCeVmktbk8wk3Is';
  const CACHE_KEY         = 'winwin_dept_v2';

  const h = {
    'apikey': SUPABASE_ANON_KEY,
    'Authorization': 'Bearer ' + SUPABASE_ANON_KEY,
    'Content-Type': 'application/json',
    'Prefer': 'return=representation'
  };

  let currentDept    = null;
  let weekData       = { 1:{goals:[],results:[]}, 2:{goals:[],results:[]}, 3:{goals:[],results:[]} };
  let addFormOpen    = { 1:false, 2:false, 3:false };
  let editFormOpen   = {};   // goalId -> bool
  let resultFormOpen = {};   // goalId -> bool
  let ynSelections   = {};   // goalId -> true/false/null
  let openWeeks      = [];   // which week cards are expanded

  // ── LOGIN ────────────────────────────────────────────────────────────────────

  async function loadDepartments() {
    const res   = await fetch(`${SUPABASE_URL}/rest/v1/departments?select=id,name,password&order=name`, { headers: h });
    const depts = await res.json();
    const sel   = document.getElementById('dept-select');
    sel.innerHTML = '<option value="">Välj avdelning…</option>';
    depts.forEach(d => {
      const opt       = document.createElement('option');
      opt.value       = JSON.stringify({ id: d.id, name: d.name, password: d.password });
      opt.textContent = d.name;
      sel.appendChild(opt);
    });
  }

  async function doLogin() {
    const selVal = document.getElementById('dept-select').value;
    const pw     = document.getElementById('password-input').value;
    const errEl  = document.getElementById('login-error');
    errEl.style.display = 'none';
    if (!selVal) { errEl.textContent = 'Välj din avdelning.'; errEl.style.display = ''; return; }
    if (!pw)     { errEl.textContent = 'Ange ditt lösenord.'; errEl.style.display = ''; return; }
    const dept = JSON.parse(selVal);
    if (pw !== dept.password) { errEl.textContent = 'Fel lösenord.'; errEl.style.display = ''; return; }
    currentDept = dept;
    sessionStorage.setItem(CACHE_KEY, JSON.stringify({ id: dept.id }));
    showMainPanel();
  }

  async function tryAutoLogin() {
    const cached = sessionStorage.getItem(CACHE_KEY);
    if (!cached) return;
    try {
      const saved = JSON.parse(cached);
      const res   = await fetch(`${SUPABASE_URL}/rest/v1/departments?id=eq.${saved.id}&select=id,name,password`, { headers: h });
      const depts = await res.json();
      if (depts.length) { currentDept = depts[0]; showMainPanel(); }
    } catch(e) {}
  }

  function showMainPanel() {
    document.getElementById('login-section').style.display = 'none';
    document.getElementById('main-section').style.display  = '';
    document.getElementById('logged-in-name').textContent  = currentDept.name;
    loadWeekData();
  }

  function doLogout() {
    currentDept = null;
    sessionStorage.removeItem(CACHE_KEY);
    document.getElementById('main-section').style.display  = 'none';
    document.getElementById('login-section').style.display = '';
    document.getElementById('password-input').value = '';
  }

  // ── DATA ─────────────────────────────────────────────────────────────────────

  async function loadWeekData() {
    document.getElementById('panel-loading').style.display   = '';
    document.getElementById('weeks-container').style.display = 'none';

    const [gRes, rRes] = await Promise.all([
      fetch(`${SUPABASE_URL}/rest/v1/weekly_goals?department_id=eq.${currentDept.id}&select=*&order=sort_order,created_at`, { headers: h }),
      fetch(`${SUPABASE_URL}/rest/v1/weekly_results?department_id=eq.${currentDept.id}&select=*`, { headers: h })
    ]);
    const goals   = await gRes.json();
    const results = await rRes.json();

    weekData = { 1:{goals:[],results:[]}, 2:{goals:[],results:[]}, 3:{goals:[],results:[]} };
    goals.forEach(g   => { if (weekData[g.week]) weekData[g.week].goals.push(g); });
    results.forEach(r => { if (weekData[r.week]) weekData[r.week].results.push(r); });

    ynSelections = {};
    results.forEach(r => { ynSelections[r.goal_id] = r.goal_met; });

    document.getElementById('panel-loading').style.display   = 'none';
    document.getElementById('weeks-container').style.display = '';
    renderWeeks();
  }

  // ── RENDER ───────────────────────────────────────────────────────────────────

  function renderWeeks() {
    // Capture currently open weeks before re-render
    [1,2,3].forEach(w => {
      const body = document.getElementById(`week-body-${w}`);
      if (body && body.classList.contains('open') && !openWeeks.includes(w)) openWeeks.push(w);
    });

    const container = document.getElementById('weeks-container');
    container.innerHTML = '';
    [1,2,3].forEach(w => container.appendChild(buildWeekCard(w)));

    // Restore open state
    openWeeks.forEach(w => {
      const body    = document.getElementById(`week-body-${w}`);
      const chevron = document.getElementById(`chevron-${w}`);
      if (body)    body.classList.add('open');
      if (chevron) chevron.classList.add('open');
    });
  }

  function buildWeekCard(week) {
    const { goals, results } = weekData[week];

    let badgeHtml = '';
    if (!goals.length) {
      badgeHtml = '<span class="badge badge-empty">Inga mål</span>';
    } else {
      badgeHtml += `<span class="badge badge-done">${goals.length} mål</span>`;
      const reportedCount = results.length;
      if (reportedCount === 0) {
        badgeHtml += '<span class="badge badge-partial">Ej rapporterat</span>';
      } else if (reportedCount < goals.length) {
        badgeHtml += `<span class="badge badge-partial">${reportedCount}/${goals.length} rapporterade</span>`;
      } else {
        const metCount = results.filter(r => r.goal_met).length;
        badgeHtml += `<span class="badge badge-done">${metCount}/${goals.length} klarade</span>`;
      }
    }

    const card = document.createElement('div');
    card.className = 'week-card';
    card.innerHTML = `
      <div class="week-card-header" onclick="toggleWeekCard(${week})">
        <div class="week-number">Vecka ${week}</div>
        <div style="display:flex;align-items:center;">
          <div class="week-status-badges">${badgeHtml}</div>
          <span class="chevron" id="chevron-${week}">▼</span>
        </div>
      </div>
      <div class="week-card-body" id="week-body-${week}">
        <div class="subsection-label">Mål vecka ${week}</div>
        <div class="goals-list" id="goals-list-${week}">
          ${goals.length
            ? goals.map((g,i) => buildGoalItem(g, i, week)).join('')
            : '<div style="font-size:13px;color:var(--faint);margin-bottom:10px;">Inga mål tillagda ännu.</div>'}
        </div>
        <div id="add-form-wrap-${week}">
          ${addFormOpen[week] ? buildAddFormHtml(week) : `<button class="add-goal-btn" onclick="openAddForm(${week})">＋ Lägg till mål</button>`}
        </div>
      </div>
    `;
    return card;
  }

  function buildGoalItem(goal, index, week) {
    const result       = weekData[week].results.find(r => r.goal_id === goal.id);
    const isEditing    = !!editFormOpen[goal.id];
    const isResultOpen = !!resultFormOpen[goal.id];

    if (isEditing) {
      return `<div class="goal-edit-form" id="goal-item-${goal.id}">
        <div style="font-size:13px;font-weight:600;color:var(--muted);margin-bottom:10px;">Redigera mål ${index+1}</div>
        <div class="field">
          <label>Mål</label>
          <input type="text" id="edit-text-${goal.id}" value="${esc(goal.goal_text)}" maxlength="200" />
        </div>
        <div class="field" style="margin-bottom:0;">
          <label>Beskrivning (valfritt)</label>
          <textarea id="edit-desc-${goal.id}" rows="2">${esc(goal.description||'')}</textarea>
        </div>
        <div class="save-row" style="margin-top:10px;">
          <button class="btn btn-primary btn-sm" onclick="saveEditGoal('${goal.id}', ${week})">Spara</button>
          <button class="btn btn-outline btn-sm" onclick="cancelEditGoal('${goal.id}', ${week})">Avbryt</button>
          <span class="save-status" id="edit-status-${goal.id}"></span>
        </div>
      </div>`;
    }

    // Result section
    let resultHtml = '';
    if (result && !isResultOpen) {
      const ynText  = result.goal_met ? '✓ Klarades' : '✗ Klarades ej';
      const ynClass = result.goal_met ? 'yes' : 'no';
      resultHtml = `<div class="result-saved">
        <span class="result-saved-yn ${ynClass}">${ynText}</span>
        ${result.comment ? `<span class="result-saved-comment">– ${esc(result.comment)}</span>` : ''}
        <button class="result-edit-link" onclick="openResultForm('${goal.id}', ${week})">Redigera</button>
      </div>`;
    } else {
      const yn       = ynSelections[goal.id];
      const yesClass = yn === true  ? 'selected-yes' : '';
      const noClass  = yn === false ? 'selected-no'  : '';
      resultHtml = `
        <div class="result-label">Klarades målet?</div>
        <div class="yn-buttons">
          <button class="yn-btn ${yesClass}" id="yn-yes-${goal.id}" onclick="selectYN('${goal.id}', true, ${week})">✓ Ja</button>
          <button class="yn-btn ${noClass}"  id="yn-no-${goal.id}"  onclick="selectYN('${goal.id}', false, ${week})">✗ Nej</button>
        </div>
        <div class="field" style="margin-bottom:0;">
          <label>Kommentar (valfritt)</label>
          <textarea id="result-comment-${goal.id}" rows="2" placeholder="Vad hände? Höjdpunkter, utmaningar…">${esc(result ? (result.comment||'') : '')}</textarea>
        </div>
        <div class="save-row">
          <button class="btn btn-primary btn-sm" onclick="saveResult('${goal.id}', ${week})">Spara resultat</button>
          ${result ? `<button class="btn btn-outline btn-sm" onclick="cancelResultForm('${goal.id}', ${week})">Avbryt</button>` : ''}
          <span class="save-status" id="result-status-${goal.id}"></span>
        </div>`;
    }

    return `<div class="goal-item" id="goal-item-${goal.id}">
      <div class="goal-item-header">
        <div style="flex:1;min-width:0;">
          <div class="goal-item-index">Mål ${index+1}</div>
          <div class="goal-item-text">${esc(goal.goal_text)}</div>
          ${goal.description ? `<div class="goal-item-desc">${esc(goal.description)}</div>` : ''}
        </div>
        <div class="goal-item-actions">
          <button class="icon-btn" title="Redigera" onclick="openEditGoal('${goal.id}', ${week})">✏️</button>
          <button class="icon-btn delete" title="Ta bort" onclick="deleteGoal('${goal.id}', ${week})">🗑</button>
        </div>
      </div>
      <div class="goal-result">${resultHtml}</div>
    </div>`;
  }

  function buildAddFormHtml(week) {
    return `<div class="add-goal-form" id="add-form-${week}">
      <div style="font-size:13px;font-weight:600;color:var(--muted);margin-bottom:10px;">Nytt mål – vecka ${week}</div>
      <div class="field">
        <label>Vad är målet?</label>
        <input type="text" id="new-goal-text-${week}" placeholder="t.ex. Genomföra 5 kundmöten" maxlength="200" />
      </div>
      <div class="field" style="margin-bottom:0;">
        <label>Beskrivning (valfritt)</label>
        <textarea id="new-goal-desc-${week}" rows="2" placeholder="Lite mer kontext…"></textarea>
      </div>
      <div class="save-row" style="margin-top:10px;">
        <button class="btn btn-primary btn-sm" onclick="saveNewGoal(${week})">Spara mål</button>
        <button class="btn btn-outline btn-sm" onclick="closeAddForm(${week})">Avbryt</button>
        <span class="save-status" id="add-status-${week}"></span>
      </div>
    </div>`;
  }

  // ── ADD GOAL ─────────────────────────────────────────────────────────────────

  function openAddForm(week) {
    addFormOpen[week] = true;
    const wrap = document.getElementById(`add-form-wrap-${week}`);
    if (wrap) { wrap.innerHTML = buildAddFormHtml(week); document.getElementById(`new-goal-text-${week}`).focus(); }
  }

  function closeAddForm(week) {
    addFormOpen[week] = false;
    const wrap = document.getElementById(`add-form-wrap-${week}`);
    if (wrap) wrap.innerHTML = `<button class="add-goal-btn" onclick="openAddForm(${week})">＋ Lägg till mål</button>`;
  }

  async function saveNewGoal(week) {
    const text     = document.getElementById(`new-goal-text-${week}`).value.trim();
    const desc     = document.getElementById(`new-goal-desc-${week}`).value.trim();
    const statusEl = document.getElementById(`add-status-${week}`);
    if (!text) { statusEl.textContent = 'Ange ett mål.'; statusEl.style.color = 'var(--danger)'; return; }
    statusEl.textContent = 'Sparar…'; statusEl.style.color = 'var(--muted)';
    try {
      const res = await fetch(`${SUPABASE_URL}/rest/v1/weekly_goals`, {
        method: 'POST', headers: h,
        body: JSON.stringify({ department_id: currentDept.id, week, goal_text: text, description: desc||null, sort_order: weekData[week].goals.length })
      });
      if (!res.ok) throw new Error(await res.text());
      addFormOpen[week] = false;
      ensureWeekOpen(week);
      await loadWeekData();
      showAlert('Mål sparat!', 'success');
    } catch(e) { statusEl.textContent = 'Kunde inte spara.'; statusEl.style.color = 'var(--danger)'; console.error(e); }
  }

  // ── EDIT GOAL ────────────────────────────────────────────────────────────────

  function openEditGoal(goalId, week) {
    editFormOpen[goalId] = true;
    refreshGoalsList(week);
  }

  function cancelEditGoal(goalId, week) {
    delete editFormOpen[goalId];
    refreshGoalsList(week);
  }

  async function saveEditGoal(goalId, week) {
    const text     = document.getElementById(`edit-text-${goalId}`).value.trim();
    const desc     = document.getElementById(`edit-desc-${goalId}`).value.trim();
    const statusEl = document.getElementById(`edit-status-${goalId}`);
    if (!text) { statusEl.textContent = 'Ange ett mål.'; statusEl.style.color = 'var(--danger)'; return; }
    statusEl.textContent = 'Sparar…'; statusEl.style.color = 'var(--muted)';
    try {
      const res = await fetch(`${SUPABASE_URL}/rest/v1/weekly_goals?id=eq.${goalId}`, {
        method: 'PATCH', headers: h,
        body: JSON.stringify({ goal_text: text, description: desc||null })
      });
      if (!res.ok) throw new Error();
      delete editFormOpen[goalId];
      ensureWeekOpen(week);
      await loadWeekData();
      showAlert('Mål uppdaterat!', 'success');
    } catch { statusEl.textContent = 'Kunde inte spara.'; statusEl.style.color = 'var(--danger)'; }
  }

  async function deleteGoal(goalId, week) {
    if (!confirm('Ta bort detta mål? Eventuellt resultat tas också bort.')) return;
    try {
      await fetch(`${SUPABASE_URL}/rest/v1/weekly_results?goal_id=eq.${goalId}`, { method: 'DELETE', headers: h });
      await fetch(`${SUPABASE_URL}/rest/v1/weekly_goals?id=eq.${goalId}`, { method: 'DELETE', headers: h });
      ensureWeekOpen(week);
      await loadWeekData();
      showAlert('Mål borttaget.', 'success');
    } catch { showAlert('Kunde inte ta bort.', 'error'); }
  }

  // ── RESULT ───────────────────────────────────────────────────────────────────

  function selectYN(goalId, val, week) {
    ynSelections[goalId] = val;
    const yBtn = document.getElementById(`yn-yes-${goalId}`);
    const nBtn = document.getElementById(`yn-no-${goalId}`);
    if (yBtn) yBtn.className = 'yn-btn' + (val === true  ? ' selected-yes' : '');
    if (nBtn) nBtn.className = 'yn-btn' + (val === false ? ' selected-no'  : '');
  }

  function openResultForm(goalId, week) {
    resultFormOpen[goalId] = true;
    refreshGoalsList(week);
  }

  function cancelResultForm(goalId, week) {
    delete resultFormOpen[goalId];
    refreshGoalsList(week);
  }

  async function saveResult(goalId, week) {
    const yn       = ynSelections[goalId];
    const comment  = (document.getElementById(`result-comment-${goalId}`)?.value || '').trim();
    const statusEl = document.getElementById(`result-status-${goalId}`);
    if (yn === null || yn === undefined) { statusEl.textContent = 'Välj Ja eller Nej.'; statusEl.style.color = 'var(--danger)'; return; }
    statusEl.textContent = 'Sparar…'; statusEl.style.color = 'var(--muted)';
    try {
      const existing = weekData[week].results.find(r => r.goal_id === goalId);
      const res = existing
        ? await fetch(`${SUPABASE_URL}/rest/v1/weekly_results?id=eq.${existing.id}`, {
            method: 'PATCH', headers: h,
            body: JSON.stringify({ goal_met: yn, comment: comment||null })
          })
        : await fetch(`${SUPABASE_URL}/rest/v1/weekly_results`, {
            method: 'POST', headers: h,
            body: JSON.stringify({ goal_id: goalId, department_id: currentDept.id, week, goal_met: yn, comment: comment||null })
          });
      if (!res.ok) throw new Error();
      delete resultFormOpen[goalId];
      ensureWeekOpen(week);
      await loadWeekData();
      showAlert('Resultat sparat!', 'success');
    } catch { statusEl.textContent = 'Kunde inte spara.'; statusEl.style.color = 'var(--danger)'; }
  }

  // ── UI HELPERS ───────────────────────────────────────────────────────────────

  function refreshGoalsList(week) {
    const list  = document.getElementById(`goals-list-${week}`);
    const goals = weekData[week].goals;
    if (!list) return;
    list.innerHTML = goals.length
      ? goals.map((g,i) => buildGoalItem(g, i, week)).join('')
      : '<div style="font-size:13px;color:var(--faint);margin-bottom:10px;">Inga mål tillagda ännu.</div>';
  }

  function toggleWeekCard(week) {
    const body    = document.getElementById(`week-body-${week}`);
    const chevron = document.getElementById(`chevron-${week}`);
    const open    = body.classList.toggle('open');
    chevron.classList.toggle('open', open);
    if (open && !openWeeks.includes(week)) openWeeks.push(week);
    if (!open) openWeeks = openWeeks.filter(w => w !== week);
  }

  function ensureWeekOpen(week) {
    if (!openWeeks.includes(week)) openWeeks.push(week);
  }

  function showAlert(msg, type) {
    const el = document.getElementById('global-alert');
    el.className   = 'alert alert-' + (type === 'error' ? 'error' : type === 'warn' ? 'warn' : 'success');
    el.textContent = msg;
    el.style.display = '';
    setTimeout(() => el.style.display = 'none', 4000);
  }

  function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

  // ── INIT ─────────────────────────────────────────────────────────────────────

  document.addEventListener('DOMContentLoaded', async () => {
    document.getElementById('password-input').addEventListener('keydown', e => {
      if (e.key === 'Enter') doLogin();
    });
    await loadDepartments();
    await tryAutoLogin();
  });
</script>
</body>
</html>
