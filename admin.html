<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Min avdelning – WinWin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --green:#1D9E75;--green-light:#E1F5EE;--green-dark:#0F6E56;
      --danger:#E24B4A;--danger-light:#FCEBEB;
      --amber:#EF9F27;--amber-light:#FAEEDA;
      --bg:#F7F6F2;--surface:#FFFFFF;
      --border:rgba(0,0,0,0.08);--border-med:rgba(0,0,0,0.14);
      --text:#1A1A18;--muted:#6B6B67;--faint:#9C9C98;
    }
    *{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}

    header{background:var(--surface);border-bottom:1px solid var(--border);padding:0 2rem;display:flex;align-items:center;justify-content:space-between;height:60px;position:sticky;top:0;z-index:100;}
    .logo{font-size:17px;font-weight:600;letter-spacing:-0.02em;}
    .logo span{color:var(--green);}
    .back-link{font-size:13px;color:var(--muted);text-decoration:none;padding:6px 12px;border:1px solid var(--border);border-radius:8px;transition:all 0.15s;}
    .back-link:hover{color:var(--text);}

    .content{max-width:700px;margin:0 auto;padding:2rem 1.5rem;}
    .page-title{font-size:22px;font-weight:600;letter-spacing:-0.02em;margin-bottom:4px;}
    .page-sub{font-size:14px;color:var(--muted);margin-bottom:2rem;}

    .card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:1.5rem;margin-bottom:1rem;}
    .card-title{font-size:16px;font-weight:600;margin-bottom:4px;}
    .card-sub{font-size:13px;color:var(--muted);margin-bottom:1.25rem;}

    .field{margin-bottom:1rem;}
    .field label{display:block;font-size:13px;font-weight:500;margin-bottom:5px;color:var(--muted);}
    .field input,.field select,.field textarea{
      width:100%;padding:10px 14px;border:1px solid var(--border-med);border-radius:10px;
      font-size:15px;font-family:'DM Sans',sans-serif;background:var(--surface);color:var(--text);
      transition:border-color 0.15s;outline:none;
    }
    .field textarea{resize:vertical;min-height:80px;line-height:1.5;}
    .field input:focus,.field select:focus,.field textarea:focus{border-color:var(--green);}

    .btn{padding:10px 20px;border:none;border-radius:10px;font-size:14px;font-weight:500;font-family:'DM Sans',sans-serif;cursor:pointer;transition:all 0.15s;}
    .btn-primary{background:var(--green);color:#fff;}
    .btn-primary:hover{background:var(--green-dark);}
    .btn-primary:disabled{background:var(--faint);cursor:default;}
    .btn-sm{padding:7px 16px;font-size:13px;}
    .btn-outline{background:var(--bg);border:1px solid var(--border-med);color:var(--text);}
    .btn-outline:hover{border-color:rgba(0,0,0,0.25);}

    .alert{padding:10px 14px;border-radius:10px;font-size:13px;margin-bottom:1rem;}
    .alert-error{background:var(--danger-light);color:var(--danger);}
    .alert-success{background:var(--green-light);color:var(--green-dark);}
    .alert-warn{background:var(--amber-light);color:#633806;}

    .section-label{font-size:12px;font-weight:500;text-transform:uppercase;letter-spacing:0.07em;color:var(--faint);margin-bottom:10px;margin-top:1.75rem;}

    /* Dept info bar */
    .dept-info-bar{display:flex;align-items:center;justify-content:space-between;background:var(--green-light);border:1px solid rgba(29,158,117,0.2);border-radius:12px;padding:12px 16px;margin-bottom:1.5rem;}
    .dept-info-name{font-size:15px;font-weight:600;color:var(--green-dark);}
    .logout-btn{font-size:12px;color:var(--faint);cursor:pointer;background:none;border:none;font-family:'DM Sans',sans-serif;padding:4px 8px;border-radius:6px;}
    .logout-btn:hover{color:var(--danger);background:var(--danger-light);}

    /* Week cards */
    .week-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;margin-bottom:1rem;overflow:hidden;}
    .week-card-header{padding:1rem 1.25rem;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;cursor:pointer;user-select:none;}
    .week-card-header:hover{background:#FAFAF8;}
    .week-number{font-size:15px;font-weight:600;}
    .week-status-badges{display:flex;gap:6px;align-items:center;}
    .badge{font-size:11px;font-weight:500;padding:3px 9px;border-radius:20px;}
    .badge-done{background:var(--green-light);color:var(--green-dark);}
    .badge-partial{background:var(--amber-light);color:#633806;}
    .badge-empty{background:#F1EFE8;color:var(--faint);}
    .chevron{font-size:12px;color:var(--faint);transition:transform 0.2s;margin-left:8px;}
    .chevron.open{transform:rotate(180deg);}
    .week-card-body{padding:1.25rem;display:none;}
    .week-card-body.open{display:block;}

    /* Goal section */
    .subsection-label{font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:0.06em;color:var(--muted);margin-bottom:10px;}
    .goal-saved-display{background:var(--green-light);border-radius:10px;padding:12px 14px;margin-bottom:12px;}
    .goal-saved-text{font-size:14px;font-weight:500;color:var(--green-dark);margin-bottom:2px;}
    .goal-saved-desc{font-size:12px;color:var(--green-dark);opacity:0.8;margin-top:3px;}
    .goal-edit-btn{font-size:12px;color:var(--green);background:none;border:none;cursor:pointer;font-family:'DM Sans',sans-serif;margin-top:6px;padding:0;text-decoration:underline;}

    /* Result section */
    .result-wrap{margin-top:1.25rem;padding-top:1.25rem;border-top:1px solid var(--border);}
    .yn-buttons{display:flex;gap:8px;margin-bottom:1rem;}
    .yn-btn{flex:1;padding:12px;border:2px solid var(--border-med);border-radius:12px;font-size:15px;font-weight:600;cursor:pointer;background:var(--bg);color:var(--muted);transition:all 0.15s;font-family:'DM Sans',sans-serif;text-align:center;}
    .yn-btn:hover{border-color:rgba(0,0,0,0.25);}
    .yn-btn.selected-yes{background:var(--green-light);border-color:var(--green);color:var(--green-dark);}
    .yn-btn.selected-no{background:var(--danger-light);border-color:var(--danger);color:var(--danger);}

    .result-saved-display{background:#F1EFE8;border-radius:10px;padding:12px 14px;margin-bottom:12px;}
    .result-saved-yn{font-size:14px;font-weight:600;}
    .result-saved-yn.yes{color:var(--green-dark);}
    .result-saved-yn.no{color:var(--danger);}
    .result-saved-comment{font-size:12px;color:var(--muted);margin-top:3px;line-height:1.4;}
    .result-edit-btn{font-size:12px;color:var(--muted);background:none;border:none;cursor:pointer;font-family:'DM Sans',sans-serif;margin-top:6px;padding:0;text-decoration:underline;}

    .save-row{display:flex;align-items:center;gap:10px;margin-top:1rem;}
    .save-status{font-size:13px;color:var(--green-dark);}

    .spinner{width:24px;height:24px;border:2px solid var(--border);border-top-color:var(--green);border-radius:50%;animation:spin 0.7s linear infinite;margin:2rem auto;}
    @keyframes spin{to{transform:rotate(360deg);}}

    @media(max-width:500px){.content{padding:1.25rem 1rem;}.yn-btn{padding:10px 6px;font-size:14px;}}
  </style>
</head>
<body>

<header>
  <div class="logo">WinWin <span>NKS</span></div>
  <a href="index.html" class="back-link">← Dashboard</a>
</header>

<div class="content">
  <div class="page-title">Min avdelning</div>
  <div class="page-sub">Lägg in era veckомål och rapportera framdriften.</div>

  <!-- LOGIN -->
  <div id="login-section">
    <div class="card" style="max-width:420px;">
      <div class="card-title">Logga in</div>
      <div class="card-sub" style="margin-bottom:1.25rem;">Välj din avdelning och ange ditt lösenord.</div>
      <div id="login-error" class="alert alert-error" style="display:none;"></div>
      <div class="field">
        <label>Avdelning</label>
        <select id="dept-select"><option value="">Laddar…</option></select>
      </div>
      <div class="field" style="margin-bottom:1.25rem;">
        <label>Lösenord</label>
        <input type="password" id="password-input" placeholder="••••••••" autocomplete="current-password" />
      </div>
      <button class="btn btn-primary" id="login-btn" style="width:100%;padding:12px;" onclick="doLogin()">Logga in</button>
    </div>
  </div>

  <!-- MAIN PANEL -->
  <div id="main-section" style="display:none;">
    <div id="global-alert" class="alert" style="display:none;"></div>

    <div class="dept-info-bar">
      <div class="dept-info-name" id="logged-in-name">–</div>
      <button class="logout-btn" onclick="doLogout()">Logga ut</button>
    </div>

    <div id="panel-loading"><div class="spinner"></div></div>
    <div id="weeks-container" style="display:none;"></div>
  </div>
</div>

<script>
  const SUPABASE_URL      = 'https://yzwzgxbkxkzjxqjzqjzq.supabase.co';
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inl6d3pneGJreGt6anhxanpxanpxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3MDAwMDAwMDAsImV4cCI6MjAxNTU2MDAwMH0.placeholder';
  const CACHE_KEY         = 'winwin_dept_session';

  const h = {
    'apikey': SUPABASE_ANON_KEY,
    'Authorization': 'Bearer ' + SUPABASE_ANON_KEY,
    'Content-Type': 'application/json',
    'Prefer': 'return=representation'
  };

  let currentDept = null;
  let weekData    = { 1: { goal: null, result: null }, 2: { goal: null, result: null }, 3: { goal: null, result: null } };

  // ─── LOGIN / LOGOUT ──────────────────────────────────────────────────────────

  async function loadDepartments() {
    const res   = await fetch(`${SUPABASE_URL}/rest/v1/departments?select=id,name,password&order=name`, { headers: h });
    const depts = await res.json();
    const sel   = document.getElementById('dept-select');
    sel.innerHTML = '<option value="">Välj avdelning…</option>';
    depts.forEach(d => {
      const opt = document.createElement('option');
      opt.value       = JSON.stringify({ id: d.id, name: d.name, password: d.password });
      opt.textContent = d.name;
      sel.appendChild(opt);
    });

    // Auto-select from cache
    const cached = sessionStorage.getItem(CACHE_KEY);
    if (cached) {
      try {
        const saved = JSON.parse(cached);
        // Find matching option
        for (const opt of sel.options) {
          if (opt.value) {
            const d = JSON.parse(opt.value);
            if (d.id === saved.id) {
              sel.value = opt.value;
              break;
            }
          }
        }
      } catch(e) {}
    }
  }

  async function doLogin() {
    const selVal = document.getElementById('dept-select').value;
    const pw     = document.getElementById('password-input').value;
    const errEl  = document.getElementById('login-error');
    errEl.style.display = 'none';

    if (!selVal) { errEl.textContent = 'Välj din avdelning.'; errEl.style.display = ''; return; }
    if (!pw)     { errEl.textContent = 'Ange ditt lösenord.'; errEl.style.display = ''; return; }

    const dept = JSON.parse(selVal);
    if (pw !== dept.password) {
      errEl.textContent = 'Fel lösenord. Försök igen.';
      errEl.style.display = '';
      return;
    }

    currentDept = dept;
    sessionStorage.setItem(CACHE_KEY, JSON.stringify({ id: dept.id }));

    document.getElementById('login-section').style.display = 'none';
    document.getElementById('main-section').style.display  = '';
    document.getElementById('logged-in-name').textContent  = dept.name;

    await loadWeekData();
  }

  function doLogout() {
    currentDept = null;
    sessionStorage.removeItem(CACHE_KEY);
    document.getElementById('main-section').style.display  = 'none';
    document.getElementById('login-section').style.display = '';
    document.getElementById('password-input').value = '';
  }

  // Auto-login from cache if password still matches
  async function tryAutoLogin() {
    const cached = sessionStorage.getItem(CACHE_KEY);
    if (!cached) return;
    try {
      const saved = JSON.parse(cached);
      const res   = await fetch(`${SUPABASE_URL}/rest/v1/departments?id=eq.${saved.id}&select=id,name,password`, { headers: h });
      const depts = await res.json();
      if (depts.length) {
        currentDept = depts[0];
        document.getElementById('login-section').style.display = 'none';
        document.getElementById('main-section').style.display  = '';
        document.getElementById('logged-in-name').textContent  = currentDept.name;
        await loadWeekData();
      }
    } catch(e) {}
  }

  // ─── DATA ────────────────────────────────────────────────────────────────────

  async function loadWeekData() {
    document.getElementById('panel-loading').style.display    = '';
    document.getElementById('weeks-container').style.display  = 'none';

    const [gRes, rRes] = await Promise.all([
      fetch(`${SUPABASE_URL}/rest/v1/weekly_goals?department_id=eq.${currentDept.id}&select=*`, { headers: h }),
      fetch(`${SUPABASE_URL}/rest/v1/weekly_results?department_id=eq.${currentDept.id}&select=*`, { headers: h })
    ]);
    const goals   = await gRes.json();
    const results = await rRes.json();

    weekData = { 1: { goal: null, result: null }, 2: { goal: null, result: null }, 3: { goal: null, result: null } };
    goals.forEach(g   => { if (weekData[g.week])   weekData[g.week].goal   = g; });
    results.forEach(r => { if (weekData[r.week])    weekData[r.week].result = r; });

    document.getElementById('panel-loading').style.display   = 'none';
    document.getElementById('weeks-container').style.display = '';
    renderWeeks();
  }

  // ─── RENDER ──────────────────────────────────────────────────────────────────

  function renderWeeks() {
    const container = document.getElementById('weeks-container');
    container.innerHTML = '';
    [1, 2, 3].forEach(w => {
      container.appendChild(buildWeekCard(w));
    });
  }

  function buildWeekCard(week) {
    const { goal, result } = weekData[week];
    const hasGoal   = !!goal;
    const hasResult = !!result;

    // Status badge
    let badgeHtml = '';
    if (!hasGoal) {
      badgeHtml = '<span class="badge badge-empty">Inget mål</span>';
    } else if (!hasResult) {
      badgeHtml = '<span class="badge badge-done">Mål satt</span><span class="badge badge-partial">Ej rapporterat</span>';
    } else {
      const yn = result.goal_met ? '✓ Klarades' : '✗ Klarades ej';
      const cls = result.goal_met ? 'badge-done' : 'badge-empty';
      badgeHtml = `<span class="badge badge-done">Mål satt</span><span class="badge ${cls}">${yn}</span>`;
    }

    const card = document.createElement('div');
    card.className = 'week-card';
    card.id = `week-card-${week}`;

    // Build body content
    const bodyId = `week-body-${week}`;

    card.innerHTML = `
      <div class="week-card-header" onclick="toggleWeekCard(${week})">
        <div class="week-number">Vecka ${week}</div>
        <div style="display:flex;align-items:center;">
          <div class="week-status-badges" id="badges-${week}">${badgeHtml}</div>
          <span class="chevron" id="chevron-${week}">▼</span>
        </div>
      </div>
      <div class="week-card-body" id="${bodyId}">
        ${buildGoalSection(week, goal)}
        ${buildResultSection(week, goal, result)}
      </div>
    `;

    return card;
  }

  function buildGoalSection(week, goal) {
    if (goal) {
      return `
        <div>
          <div class="subsection-label">Mål</div>
          <div class="goal-saved-display" id="goal-display-${week}">
            <div class="goal-saved-text">${esc(goal.goal_text)}</div>
            ${goal.description ? `<div class="goal-saved-desc">${esc(goal.description)}</div>` : ''}
            <button class="goal-edit-btn" onclick="showGoalForm(${week})">Redigera mål</button>
          </div>
          <div id="goal-form-${week}" style="display:none;">
            ${goalFormHtml(week, goal)}
          </div>
        </div>
      `;
    } else {
      return `
        <div>
          <div class="subsection-label">Mål för vecka ${week}</div>
          <div id="goal-display-${week}" style="display:none;"></div>
          <div id="goal-form-${week}">
            ${goalFormHtml(week, null)}
          </div>
        </div>
      `;
    }
  }

  function goalFormHtml(week, existing) {
    return `
      <div class="field">
        <label>Vad är målet den här veckan?</label>
        <input type="text" id="goal-text-${week}" value="${esc(existing ? existing.goal_text : '')}" placeholder="t.ex. Ringa 50 prospekt eller Genomföra 3 kundmöten" maxlength="200" />
      </div>
      <div class="field" style="margin-bottom:0;">
        <label>Beskrivning / förklaring (valfritt)</label>
        <textarea id="goal-desc-${week}" rows="2" placeholder="Lite mer kontext om målet…">${esc(existing ? (existing.description||'') : '')}</textarea>
      </div>
      <div class="save-row">
        <button class="btn btn-primary btn-sm" onclick="saveGoal(${week})">Spara mål</button>
        ${existing ? `<button class="btn btn-outline btn-sm" onclick="hideGoalForm(${week})">Avbryt</button>` : ''}
        <span class="save-status" id="goal-status-${week}"></span>
      </div>
    `;
  }

  function buildResultSection(week, goal, result) {
    if (!goal) return ''; // No point in reporting without a goal

    if (result) {
      const yn      = result.goal_met;
      const ynText  = yn ? '✓ Ja – målet klarades' : '✗ Nej – målet klarades inte';
      const ynClass = yn ? 'yes' : 'no';
      return `
        <div class="result-wrap">
          <div class="subsection-label">Resultat</div>
          <div class="result-saved-display" id="result-display-${week}">
            <div class="result-saved-yn ${ynClass}">${ynText}</div>
            ${result.comment ? `<div class="result-saved-comment">${esc(result.comment)}</div>` : ''}
            <button class="result-edit-btn" onclick="showResultForm(${week})">Redigera resultat</button>
          </div>
          <div id="result-form-${week}" style="display:none;">
            ${resultFormHtml(week, result)}
          </div>
        </div>
      `;
    } else {
      return `
        <div class="result-wrap">
          <div class="subsection-label">Resultat för vecka ${week}</div>
          <div id="result-display-${week}" style="display:none;"></div>
          <div id="result-form-${week}">
            ${resultFormHtml(week, null)}
          </div>
        </div>
      `;
    }
  }

  function resultFormHtml(week, existing) {
    const yesSelected = existing && existing.goal_met === true  ? 'selected-yes' : '';
    const noSelected  = existing && existing.goal_met === false ? 'selected-no'  : '';
    return `
      <div class="yn-buttons">
        <button class="yn-btn ${yesSelected}" id="yn-yes-${week}" onclick="selectYN(${week}, true)">✓ Ja, klarades</button>
        <button class="yn-btn ${noSelected}"  id="yn-no-${week}"  onclick="selectYN(${week}, false)">✗ Nej, klarades ej</button>
      </div>
      <div class="field" style="margin-bottom:0;">
        <label>Kommentar – vad hände den här veckan?</label>
        <textarea id="result-comment-${week}" rows="3" placeholder="Berätta kort om veckans arbete, utmaningar eller höjdpunkter…">${esc(existing ? (existing.comment||'') : '')}</textarea>
      </div>
      <div class="save-row">
        <button class="btn btn-primary btn-sm" onclick="saveResult(${week})">Spara resultat</button>
        ${existing ? `<button class="btn btn-outline btn-sm" onclick="hideResultForm(${week})">Avbryt</button>` : ''}
        <span class="save-status" id="result-status-${week}"></span>
      </div>
    `;
  }

  // ─── STATE: Y/N selection ─────────────────────────────────────────────────────

  const ynSelections = { 1: null, 2: null, 3: null };

  function selectYN(week, val) {
    ynSelections[week] = val;
    const yBtn = document.getElementById(`yn-yes-${week}`);
    const nBtn = document.getElementById(`yn-no-${week}`);
    if (yBtn) { yBtn.className = 'yn-btn' + (val === true  ? ' selected-yes' : ''); }
    if (nBtn) { nBtn.className = 'yn-btn' + (val === false ? ' selected-no'  : ''); }
  }

  // Initialize selections from existing results
  function initYNSelections() {
    [1,2,3].forEach(w => {
      if (weekData[w].result) {
        ynSelections[w] = weekData[w].result.goal_met;
      } else {
        ynSelections[w] = null;
      }
    });
  }

  // ─── SAVE ────────────────────────────────────────────────────────────────────

  async function saveGoal(week) {
    const text = document.getElementById(`goal-text-${week}`).value.trim();
    const desc = document.getElementById(`goal-desc-${week}`).value.trim();
    const statusEl = document.getElementById(`goal-status-${week}`);

    if (!text) { statusEl.textContent = 'Ange ett mål.'; statusEl.style.color = 'var(--danger)'; return; }

    statusEl.textContent = 'Sparar…'; statusEl.style.color = 'var(--muted)';

    try {
      const existing = weekData[week].goal;
      let res;
      if (existing) {
        res = await fetch(`${SUPABASE_URL}/rest/v1/weekly_goals?id=eq.${existing.id}`, {
          method: 'PATCH', headers: h,
          body: JSON.stringify({ goal_text: text, description: desc || null })
        });
      } else {
        res = await fetch(`${SUPABASE_URL}/rest/v1/weekly_goals`, {
          method: 'POST', headers: h,
          body: JSON.stringify({ department_id: currentDept.id, week, goal_text: text, description: desc || null })
        });
      }
      if (!res.ok) throw new Error(res.status);
      await loadWeekData();
      showAlert('Mål sparat!', 'success');
    } catch(err) {
      statusEl.textContent = 'Fel – kunde inte spara.'; statusEl.style.color = 'var(--danger)';
    }
  }

  async function saveResult(week) {
    const yn        = ynSelections[week];
    const comment   = document.getElementById(`result-comment-${week}`).value.trim();
    const statusEl  = document.getElementById(`result-status-${week}`);

    if (yn === null) { statusEl.textContent = 'Välj Ja eller Nej.'; statusEl.style.color = 'var(--danger)'; return; }

    statusEl.textContent = 'Sparar…'; statusEl.style.color = 'var(--muted)';

    try {
      const existing = weekData[week].result;
      let res;
      if (existing) {
        res = await fetch(`${SUPABASE_URL}/rest/v1/weekly_results?id=eq.${existing.id}`, {
          method: 'PATCH', headers: h,
          body: JSON.stringify({ goal_met: yn, comment: comment || null })
        });
      } else {
        res = await fetch(`${SUPABASE_URL}/rest/v1/weekly_results`, {
          method: 'POST', headers: h,
          body: JSON.stringify({ department_id: currentDept.id, week, goal_met: yn, comment: comment || null })
        });
      }
      if (!res.ok) throw new Error(res.status);
      await loadWeekData();
      showAlert('Resultat sparat och publicerat på dashboard!', 'success');
    } catch(err) {
      statusEl.textContent = 'Fel – kunde inte spara.'; statusEl.style.color = 'var(--danger)';
    }
  }

  // ─── UI HELPERS ──────────────────────────────────────────────────────────────

  function toggleWeekCard(week) {
    const body    = document.getElementById(`week-body-${week}`);
    const chevron = document.getElementById(`chevron-${week}`);
    const open    = body.classList.toggle('open');
    if (chevron) chevron.classList.toggle('open', open);
  }

  function showGoalForm(week) {
    document.getElementById(`goal-display-${week}`).style.display = 'none';
    document.getElementById(`goal-form-${week}`).style.display    = '';
  }
  function hideGoalForm(week) {
    document.getElementById(`goal-display-${week}`).style.display = '';
    document.getElementById(`goal-form-${week}`).style.display    = 'none';
  }
  function showResultForm(week) {
    document.getElementById(`result-display-${week}`).style.display = 'none';
    document.getElementById(`result-form-${week}`).style.display    = '';
  }
  function hideResultForm(week) {
    document.getElementById(`result-display-${week}`).style.display = '';
    document.getElementById(`result-form-${week}`).style.display    = 'none';
  }

  function showAlert(msg, type) {
    const el = document.getElementById('global-alert');
    el.className = 'alert alert-' + (type === 'error' ? 'error' : type === 'warn' ? 'warn' : 'success');
    el.textContent = msg;
    el.style.display = '';
    setTimeout(() => el.style.display = 'none', 4000);
  }

  function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

  // ─── INIT ────────────────────────────────────────────────────────────────────

  document.addEventListener('DOMContentLoaded', async () => {
    document.getElementById('password-input').addEventListener('keydown', e => {
      if (e.key === 'Enter') doLogin();
    });
    await loadDepartments();
    await tryAutoLogin();
  });
</script>
</body>
</html>
