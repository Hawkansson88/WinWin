<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WinWin – DNB Finans NKS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --green:#1D9E75;--green-light:#E1F5EE;--green-dark:#0F6E56;
      --danger:#E24B4A;--danger-light:#FCEBEB;
      --amber:#EF9F27;--amber-light:#FAEEDA;
      --bg:#F7F6F2;--surface:#FFFFFF;
      --border:rgba(0,0,0,0.08);--border-med:rgba(0,0,0,0.14);
      --text:#1A1A18;--muted:#6B6B67;--faint:#9C9C98;
    }
    *{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}

    header{background:var(--surface);border-bottom:1px solid var(--border);padding:0 2rem;display:flex;align-items:center;justify-content:space-between;height:60px;position:sticky;top:0;z-index:100;}
    .logo{font-size:17px;font-weight:600;letter-spacing:-0.02em;display:flex;align-items:center;gap:10px;}
    .logo-dot{width:9px;height:9px;background:var(--green);border-radius:50%;animation:pulse 2s infinite;}
    @keyframes pulse{0%,100%{transform:scale(1);opacity:1;}50%{transform:scale(1.4);opacity:0.7;}}
    .header-right{display:flex;align-items:center;gap:10px;}
    .admin-btn{font-size:13px;color:var(--muted);text-decoration:none;padding:6px 14px;border:1px solid var(--border);border-radius:8px;transition:all 0.15s;}
    .admin-btn:hover{color:var(--text);border-color:var(--border-med);}

    .hero{background:var(--green);color:#fff;padding:1.75rem 2rem;}
    .hero-title{font-size:26px;font-weight:600;letter-spacing:-0.02em;}
    .hero-sub{font-size:14px;opacity:0.8;margin-top:4px;}
    .hero-stats{display:flex;gap:2rem;margin-top:1.25rem;flex-wrap:wrap;}
    .hstat{background:rgba(255,255,255,0.15);border-radius:12px;padding:12px 18px;min-width:120px;}
    .hstat-val{font-size:28px;font-weight:600;font-family:'DM Mono',monospace;line-height:1;}
    .hstat-label{font-size:12px;opacity:0.8;margin-top:4px;}

    .week-tabs-wrap{background:var(--surface);border-bottom:1px solid var(--border);padding:0 2rem;display:flex;align-items:center;gap:4px;height:50px;}
    .week-tab{padding:6px 18px;border-radius:8px;font-size:14px;font-weight:500;cursor:pointer;color:var(--muted);transition:all 0.15s;border:none;background:none;}
    .week-tab.active{background:var(--green-light);color:var(--green-dark);}
    .week-tab:hover:not(.active){color:var(--text);}

    .content{padding:2rem;max-width:1100px;margin:0 auto;}

    .dept-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:14px;}
    .dept-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;overflow:hidden;animation:fadeUp 0.3s ease both;transition:box-shadow 0.15s;}
    .dept-card:hover{box-shadow:0 6px 20px rgba(0,0,0,0.07);}
    @keyframes fadeUp{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}

    .card-header{padding:1.1rem 1.25rem;border-bottom:1px solid var(--border);}
    .card-name{font-size:16px;font-weight:600;margin-bottom:2px;}
    .card-badges{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px;}
    .badge{font-size:11px;font-weight:500;padding:3px 9px;border-radius:20px;}
    .badge-goal{background:var(--green-light);color:var(--green-dark);}
    .badge-result{background:var(--green-light);color:var(--green-dark);}
    .badge-no-goal{background:#F1EFE8;color:var(--faint);}
    .badge-no-result{background:var(--amber-light);color:#633806;}
    .badge-met{background:var(--green-light);color:var(--green-dark);}
    .badge-not-met{background:var(--danger-light);color:var(--danger);}

    .weeks-wrap{padding:1rem 1.25rem;}
    .week-row{margin-bottom:1rem;padding-bottom:1rem;border-bottom:1px solid var(--border);}
    .week-row:last-child{margin-bottom:0;padding-bottom:0;border-bottom:none;}
    .week-label{font-size:11px;font-weight:500;text-transform:uppercase;letter-spacing:0.07em;color:var(--faint);margin-bottom:6px;}
    .week-goal-text{font-size:14px;font-weight:500;color:var(--text);margin-bottom:4px;line-height:1.4;}
    .week-goal-desc{font-size:12px;color:var(--muted);margin-bottom:6px;line-height:1.4;}
    .week-result-row{display:flex;align-items:center;gap:8px;margin-top:4px;}
    .result-pill{font-size:12px;font-weight:600;padding:3px 10px;border-radius:20px;white-space:nowrap;}
    .result-pill.yes{background:var(--green-light);color:var(--green-dark);}
    .result-pill.no{background:var(--danger-light);color:var(--danger);}
    .result-comment{font-size:12px;color:var(--muted);line-height:1.4;flex:1;}
    .week-empty{font-size:12px;color:var(--faint);font-style:italic;}

    .spinner{width:32px;height:32px;border:2px solid var(--border);border-top-color:var(--green);border-radius:50%;animation:spin 0.7s linear infinite;margin:3rem auto;}
    @keyframes spin{to{transform:rotate(360deg);}}
    .loading-wrap{text-align:center;padding:4rem 2rem;}

    .section-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.25rem;}
    .section-title{font-size:13px;font-weight:500;color:var(--muted);text-transform:uppercase;letter-spacing:0.07em;}
    .legend{display:flex;gap:14px;align-items:center;}
    .legend-item{display:flex;align-items:center;gap:5px;font-size:12px;color:var(--muted);}
    .legend-dot{width:8px;height:8px;border-radius:50%;}

    @media(max-width:600px){.content{padding:1.25rem 1rem;}.hero{padding:1.25rem 1rem;}.week-tabs-wrap{padding:0 1rem;}.hero-stats{gap:1rem;}.hstat{padding:10px 14px;}}
  </style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-dot"></div>
    WinWin – DNB Finans NKS
  </div>
  <div class="header-right">
    <a href="admin.html" class="admin-btn">Min avdelning →</a>
  </div>
</header>

<div class="hero">
  <div class="hero-title">Veckans framdrift</div>
  <div class="hero-sub">Kampanj – 3 veckor · Uppdateras löpande av avdelningscheferna</div>
  <div class="hero-stats" id="hero-stats">
    <div class="hstat"><div class="hstat-val" id="stat-depts">–</div><div class="hstat-label">avdelningar</div></div>
    <div class="hstat"><div class="hstat-val" id="stat-goals">–</div><div class="hstat-label">har satt mål v.<span id="stat-week-label">?</span></div></div>
    <div class="hstat"><div class="hstat-val" id="stat-results">–</div><div class="hstat-label">har rapporterat v.<span id="stat-week-label2">?</span></div></div>
    <div class="hstat"><div class="hstat-val" id="stat-met">–</div><div class="hstat-label">klarade målet</div></div>
  </div>
</div>

<div class="week-tabs-wrap">
  <button class="week-tab active" data-week="1" onclick="setWeek(this,1)">Vecka 1</button>
  <button class="week-tab" data-week="2" onclick="setWeek(this,2)">Vecka 2</button>
  <button class="week-tab" data-week="3" onclick="setWeek(this,3)">Vecka 3</button>
  <button class="week-tab" data-week="0" onclick="setWeek(this,0)">Alla veckor</button>
</div>

<div class="content">
  <div class="section-head">
    <div class="section-title" id="view-label">Visar vecka 1</div>
  </div>

  <div id="loading-wrap" class="loading-wrap">
    <div class="spinner"></div>
    <div style="font-size:14px;color:var(--faint);margin-top:12px;">Laddar avdelningar…</div>
  </div>

  <div class="dept-grid" id="dept-grid" style="display:none;"></div>
</div>

<script>
  const SUPABASE_URL     = 'https://yzwzgxbkxkzjxqjzqjzq.supabase.co';
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inl6d3pneGJreGt6anhxanpxanpxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3MDAwMDAwMDAsImV4cCI6MjAxNTU2MDAwMH0.placeholder';

  const h = { 'apikey': SUPABASE_ANON_KEY, 'Authorization': 'Bearer ' + SUPABASE_ANON_KEY };

  let currentWeek = 1;
  let allDepts = [], allGoals = [], allResults = [];

  async function fetchAll() {
    const [dRes, gRes, rRes] = await Promise.all([
      fetch(`${SUPABASE_URL}/rest/v1/departments?select=id,name&order=name`, { headers: h }),
      fetch(`${SUPABASE_URL}/rest/v1/weekly_goals?select=*`, { headers: h }),
      fetch(`${SUPABASE_URL}/rest/v1/weekly_results?select=*`, { headers: h })
    ]);
    allDepts   = await dRes.json();
    allGoals   = await gRes.json();
    allResults = await rRes.json();
  }

  function updateStats() {
    const deptCount = allDepts.length;
    document.getElementById('stat-depts').textContent = deptCount;

    if (currentWeek === 0) {
      document.getElementById('stat-week-label').textContent  = '';
      document.getElementById('stat-week-label2').textContent = '';
      const withGoals   = allDepts.filter(d => allGoals.some(g => g.department_id === d.id)).length;
      const withResults = allDepts.filter(d => allResults.some(r => r.department_id === d.id)).length;
      const metCount    = allResults.filter(r => r.goal_met === true).length;
      document.getElementById('stat-goals').textContent   = withGoals;
      document.getElementById('stat-results').textContent = withResults;
      document.getElementById('stat-met').textContent     = metCount;
    } else {
      document.getElementById('stat-week-label').textContent  = currentWeek;
      document.getElementById('stat-week-label2').textContent = currentWeek;
      const withGoals   = allDepts.filter(d => allGoals.some(g => g.department_id === d.id && g.week === currentWeek)).length;
      const withResults = allDepts.filter(d => allResults.some(r => r.department_id === d.id && r.week === currentWeek)).length;
      const metCount    = allResults.filter(r => r.week === currentWeek && r.goal_met === true).length;
      document.getElementById('stat-goals').textContent   = withGoals;
      document.getElementById('stat-results').textContent = withResults;
      document.getElementById('stat-met').textContent     = metCount;
    }
  }

  function renderCards() {
    updateStats();
    const grid = document.getElementById('dept-grid');
    grid.innerHTML = '';

    const weeks = currentWeek === 0 ? [1,2,3] : [currentWeek];

    allDepts.forEach((dept, i) => {
      const card = document.createElement('div');
      card.className = 'dept-card';
      card.style.animationDelay = (i * 0.04) + 's';

      // Badges for current view
      const badgesHtml = weeks.map(w => {
        const goal   = allGoals.find(g => g.department_id === dept.id && g.week === w);
        const result = allResults.find(r => r.department_id === dept.id && r.week === w);
        const wLabel = currentWeek === 0 ? `V${w} ` : '';
        let html = '';
        html += goal
          ? `<span class="badge badge-goal">${wLabel}Mål satt</span>`
          : `<span class="badge badge-no-goal">${wLabel}Inget mål</span>`;
        if (goal) {
          html += result
            ? (result.goal_met
                ? `<span class="badge badge-met">${wLabel}Klarade ✓</span>`
                : `<span class="badge badge-not-met">${wLabel}Klarade ej</span>`)
            : `<span class="badge badge-no-result">${wLabel}Ej rapporterat</span>`;
        }
        return html;
      }).join('');

      // Week rows
      const weeksHtml = weeks.map(w => {
        const goal   = allGoals.find(g => g.department_id === dept.id && g.week === w);
        const result = allResults.find(r => r.department_id === dept.id && r.week === w);
        const wTitle = currentWeek === 0 ? `Vecka ${w}` : `Vecka ${w}`;

        if (!goal) {
          return `<div class="week-row">
            <div class="week-label">${wTitle}</div>
            <div class="week-empty">Inget mål har lagts in ännu.</div>
          </div>`;
        }

        let resultHtml = '';
        if (result) {
          const pillClass = result.goal_met ? 'yes' : 'no';
          const pillText  = result.goal_met ? '✓ Klarades' : '✗ Klarades ej';
          resultHtml = `<div class="week-result-row">
            <span class="result-pill ${pillClass}">${pillText}</span>
            ${result.comment ? `<span class="result-comment">${esc(result.comment)}</span>` : ''}
          </div>`;
        } else {
          resultHtml = `<div class="week-empty" style="margin-top:4px;">Resultat ej rapporterat.</div>`;
        }

        return `<div class="week-row">
          <div class="week-label">${wTitle}</div>
          <div class="week-goal-text">${esc(goal.goal_text)}</div>
          ${goal.description ? `<div class="week-goal-desc">${esc(goal.description)}</div>` : ''}
          ${resultHtml}
        </div>`;
      }).join('');

      card.innerHTML = `
        <div class="card-header">
          <div class="card-name">${esc(dept.name)}</div>
          <div class="card-badges">${badgesHtml}</div>
        </div>
        <div class="weeks-wrap">${weeksHtml}</div>
      `;
      grid.appendChild(card);
    });
  }

  function setWeek(btn, w) {
    currentWeek = w;
    document.querySelectorAll('.week-tab').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('view-label').textContent = w === 0 ? 'Visar alla veckor' : `Visar vecka ${w}`;
    renderCards();
  }

  async function init() {
    try {
      await fetchAll();
      document.getElementById('loading-wrap').style.display = 'none';
      document.getElementById('dept-grid').style.display = '';
      renderCards();
    } catch(err) {
      document.getElementById('loading-wrap').innerHTML = `<div style="color:var(--danger);font-size:14px;">Kunde inte ladda data: ${err.message}</div>`;
    }
  }

  function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

  init();
</script>
</body>
</html>
